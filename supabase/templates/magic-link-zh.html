<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录链接</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background-color: #FDFDFD;
      color: #1A1A1A;
      padding: 48px 24px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .app-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #666666;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      color: #666666;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background-color: #1A1A1A;
      color: #FDFDFD !important;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 4px;
      margin-bottom: 32px;
    }
    .divider {
      border: none;
      border-top: 1px solid #EEEEEE;
      margin: 32px 0;
    }
    .link-fallback {
      font-size: 12px;
      color: #888888;
      line-height: 1.6;
    }
    .link-fallback a {
      color: #1A1A1A;
      word-break: break-all;
    }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-name">语言学习</div>

    <h1>您的登录链接</h1>
    <p>点击下方按钮即可登录。此链接有效期为 1 小时，且只能使用一次。</p>

    <a href="{{ .ConfirmationURL }}" class="btn">登录</a>

    <hr class="divider">

    <div class="link-fallback">
      <p style="margin-bottom: 8px;">如果按钮无法点击，请复制以下链接到浏览器地址栏：</p>
      <a href="{{ .ConfirmationURL }}">{{ .ConfirmationURL }}</a>
    </div>

    <div class="footer">
      <p>如果您没有请求此邮件，请忽略。您的账号不会受到任何影响。</p>
    </div>
  </div>
</body>
</html>
